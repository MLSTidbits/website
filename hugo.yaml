# Hugo configuration file
title: MLS Tidbits
languageCode: "en-us"

copyright: "© 2024 MLS Tidbits. All rights reserved."

enableInlineShortcodes: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false
    style: "github-dark"

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

menu:
  main:
    - identifier: blog
      name: "Blog"
      url: "/blog/"
      weight: 1
    - identifier: docs
      name: "Guides"
      url: "/docs"
      weight: 2
    - identifier: more
      name: "More"
      weight: 3
    - identifier: more
      name: "More"
      weight: 3
      hasChildren: true
    - identifier: search
      weight: 4
      params:
        type: search
    - identifier: github
      name: "GitHub"
      url: "https://github.com/MLSTidbits"
      weight: 5
      params:
        icon: github
    - identifier: projects
      name: "Projects"
      url: "/projects"
      weight: 1
      parent: more
    - identifier: about
      name: "About"
      pageRef: /about
      weight: 2
      parent: more

params:
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /images/logo.svg
      dark: /images/logo.svg
      link: /
      width: 20
      height: 20

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "/"

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    tabs:
      sync: false

  comments:
    enable: true
    type: giscus

    # https://giscus.app/
    giscus:
      repo: MLSTidbits/website
      repoId: R_kgDOPWxVpQ
      category: Announcements
      categoryId: DIC_kwDOPWxVpc4Ctr99
      mapping: pathname
      strict: 0
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: top
      lang: en
      theme: noborder_dark

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 25

    article:
      displayPagination: true

  toc:
    displayTags: true

  theme:
    # light | dark | system
    default: system
    displayToggle: false

  params:
    # Search
    search:
      enable: true
      type: flexsearch

      flexsearch:
        # index page by: content | summary | heading | title
        index: content
        # full | forward | reverse | strict
        # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
        tokenize: forward
